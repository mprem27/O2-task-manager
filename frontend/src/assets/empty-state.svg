<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 200">
  <defs>
    <!-- Heavy blur for the neon orbs -->
    <filter id="heavyBlur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="18"/>
    </filter>
    <!-- Frosted glass card fill -->
    <linearGradient id="glassCard" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.7)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.15)"/>
    </linearGradient>
    <!-- Glossy border shine -->
    <linearGradient id="shineBorder" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.1)"/>
    </linearGradient>
  </defs>

  <!-- Glowing Neon Orbs (Background) -->
  <circle cx="70" cy="70" r="45" fill="#8b5cf6" opacity="0.8" filter="url(#heavyBlur)"/>
  <circle cx="160" cy="130" r="50" fill="#06b6d4" opacity="0.7" filter="url(#heavyBlur)"/>
  
  <!-- Glass Card (Foreground) -->
  <rect x="45" y="35" width="150" height="130" rx="16" fill="url(#glassCard)" stroke="url(#shineBorder)" stroke-width="1.5" />
  
  <!-- Diagonal Gloss Reflection on the Glass -->
  <path d="M 46 55 Q 120 40 194 65 V 50 Q 194 36 179 36 H 61 Q 46 36 46 50 Z" fill="rgba(255,255,255,0.4)"/>
  
  <!-- Empty State Search Icon / Content inside the glass -->
  <circle cx="120" cy="85" r="22" fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="4"/>
  <line x1="136" y1="101" x2="155" y2="120" stroke="rgba(255,255,255,0.9)" stroke-width="5" stroke-linecap="round"/>
  
  <rect x="75" y="130" width="90" height="6" rx="3" fill="rgba(255,255,255,0.8)"/>
  <rect x="95" y="145" width="50" height="6" rx="3" fill="rgba(255,255,255,0.6)"/>
</svg>
