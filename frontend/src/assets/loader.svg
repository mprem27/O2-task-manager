<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- The glowing ring gradient -->
    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    <!-- Neon blur effect -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Faded glass track -->
  <circle cx="50" cy="50" r="35" fill="none" stroke="rgba(148, 163, 184, 0.2)" stroke-width="8" />
  
  <!-- Glowing spinning gradient -->
  <path d="M 50 15 A 35 35 0 0 1 85 50" fill="none" stroke="url(#ring-grad)" stroke-width="8" stroke-linecap="round" filter="url(#neon-glow)"/>
  
  <!-- Highlight burst at the leading edge -->
  <circle cx="85" cy="50" r="4" fill="#ffffff" filter="url(#neon-glow)"/>
</svg>
